recipe: default.v1
language: en
pipeline:
- name: LLMBasedRouter
  llm:
    model_name: "gpt-35-turbo"
    engine: "test-gpt-35-turbo"
    api_type: "azure"
    api_version: "2024-02-01"
    openai_api_base: "https://devtribe-testing-canada-east.openai.azure.com/"
    request_timeout: 14
  calm_entry:
    sticky: "handles everything else, including finance and pizza orders"
  nlu_entry:
    sticky: "handles everything around health advice and hotel or restaurant bookings"
    non_sticky: "handles chitchat"
- name: WhitespaceTokenizer
- name: CountVectorsFeaturizer
- name: CountVectorsFeaturizer
  analyzer: char_wb
  min_ngram: 1
  max_ngram: 4
- name: LogisticRegressionClassifier
  max_iter: 100
  solver: lbfgs
  tol: 0.0001
  random_state: 42
  ranking_length: 10
- name: CRFEntityExtractor
- name: DucklingEntityExtractor
  url: "http://localhost:8000"
  dimensions: [ "time", "number" ]
  timezone: "Europe/Berlin"
  timeout: 3
- name: NLUCommandAdapter
- name: MultiStepLLMCommandGenerator
  flow_retrieval:
    embeddings:
      model: text-embedding-3-small
      deployment: test-text-embedding-3-small
      openai_api_base: "https://devtribe-testing-canada-east.openai.azure.com/"
      openai_api_type: azure
      openai_api_version: "2024-02-01"
    llm:
      model_name: "gpt-35-turbo"
      engine: "test-gpt-35-turbo"
      api_type: "azure"
      api_version: "2024-02-01"
      openai_api_base: "https://devtribe-testing-canada-east.openai.azure.com/"
      request_timeout: 7
